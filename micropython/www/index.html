<!DOCTYPE html>
<html>
<head>
  <title>Split Flap</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .content-container {
      width: 90%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #title {
      font-family: 'expressway', sans-serif;
      font-style: normal;
      font-weight: 200;
      font-size: 48px;
      background-color: #1a1a1a;
      color: #fff;
      letter-spacing: 2px;
      margin: 10px 0;
      padding: 5px 10px;
    }
    #status-display {
      width: 100%;
      box-sizing: border-box;
      margin: 10px 0;
      padding: 12px;
      background: #111;
      border-radius: 6px;
      border: 1px solid #333;
    }
    .flap-row {
      display: flex;
      justify-content: center;
      gap: 3px;
      margin: 2px 0;
    }
    .flap {
      width: 28px;
      height: 36px;
      background: #222;
      border: 1px solid #333;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
    }
    .status-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #222;
    }
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .status-dot.on { background: #4a4; }
    .status-dot.off { background: #a44; }
    #form {
      background-color: #252525;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      box-sizing: border-box;
    }
    .form-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 5px 0;
    }
    #form input[type="text"],
    #form select,
    #form button {
      font-size: 16px;
      padding: 8px 10px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #333;
      color: #e0e0e0;
    }
    #form input[type="text"]::placeholder {
      color: #777;
    }
    #form button {
      background-color: #383838;
      border: 1px solid #555;
      cursor: pointer;
    }
    #form button:hover {
      background-color: #444;
    }
    #preset-container {
      margin-top: 20px;
      font-size: 14px;
      text-align: center;
      line-height: 2;
    }
    #preset-container a {
      margin: 0 5px;
      color: #f0c040;
      text-decoration: none;
    }
    #preset-container a:hover {
      text-decoration: underline;
    }
    .crontab-section {
      margin-top: 30px;
      padding: 16px;
      background: #252525;
      border: 1px solid #333;
      border-radius: 5px;
      width: 100%;
      box-sizing: border-box;
    }
    .crontab-section h2 {
      margin: 0 0 10px;
      font-weight: normal;
      font-size: 16px;
      color: #aaa;
    }
    #crontabEditor {
      width: 100%;
      height: 200px;
      font-family: monospace;
      font-size: 13px;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px;
      box-sizing: border-box;
      resize: vertical;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    .crontab-section button {
      background-color: #383838;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 14px;
      margin-top: 10px;
      cursor: pointer;
    }
    .crontab-section button:hover {
      background-color: #444;
    }
    .toast {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      display: none;
      font-size: 14px;
    }
    .toast.error {
      background-color: #3a1a1a;
      color: #e55;
    }
  </style>
  <script>
    const randomWords = ["Apple", "Banana", "Cherry", "Date", "Elderberry", "Fig", "Grape", "Honeydew"];
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }
    async function fetchWithTimeout(resource, options) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), 2000);
      const response = await fetch(resource, { ...options, signal: controller.signal });
      clearTimeout(id);
      return response;
    }
    async function submitGoForm() {
      try {
        const form = document.getElementById('form');
        const response = await fetchWithTimeout(form.action, {
          method: "post",
          body: new URLSearchParams(new FormData(form))
        });
        if (!response.ok) {
          throw new Error('Failed to send message');
        }
      } catch (error) {
        showToast('Error: ' + error, 'goToast');
      }
    }
    async function fillWithRandomWords() {
      const textInput = document.getElementById("text_input");
      shuffleArray(randomWords);
      const words = [];
      let words_len = 0;
      for (const word of randomWords) {
        if (words_len + word.length <= 20) {
          words.push(word);
          words_len += word.length + 1;
        }
        if (words_len >= 20) {
          break;
        }
      }
      textInput.value = words.join(' ');
      submitGoForm();
    }
    async function preset(params, order_preset) {
      const orderInput = document.getElementById("order_input");
      const rpmInput = document.getElementById("rpm_input");
      orderInput.value = order_preset;
      const data = { order: order_preset, rpm: rpmInput.value, ...params };
      try {
        const response = await fetchWithTimeout('/display', {
          method: "post",
          body: new URLSearchParams(data)
        });
        if (!response.ok) {
          throw new Error('Failed to send message');
        }
      } catch (error) {
        showToast('Error: ' + error, 'goToast');
      }
    }
    function formatUptime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
    }
    function formatMemory(bytes) {
      return Math.round(bytes / 1024) + 'KB';
    }
    function renderFlaps(status) {
      const container = document.getElementById('flap-container');
      const rows = status.rows || 2;
      const cols = status.cols || 12;
      const text = status.text || '';
      const padded = text.padEnd(rows * cols).slice(0, rows * cols);
      let html = '';
      for (let r = 0; r < rows; r++) {
        html += '<div class="flap-row">';
        for (let c = 0; c < cols; c++) {
          const ch = padded[r * cols + c];
          html += '<div class="flap">' + (ch === ' ' ? '&nbsp;' : ch.replace(/</g, '&lt;')) + '</div>';
        }
        html += '</div>';
      }
      container.innerHTML = html;
    }
    function updateStatus() {
      fetch('/status')
        .then(r => r.json())
        .then(status => {
          renderFlaps(status);
          const dot = document.getElementById('wifi-dot');
          dot.className = 'status-dot ' + (status.wifi ? 'on' : 'off');
          document.getElementById('status-source').textContent = status.source;
          document.getElementById('status-uptime').textContent = formatUptime(status.uptime);
          document.getElementById('status-mem').textContent = formatMemory(status.mem_free);
        })
        .catch(() => {});
    }
    updateStatus();
    setInterval(updateStatus, 5000);
    fetch('/crontab')
      .then(response => response.text())
      .then(text => {
        document.getElementById('crontabEditor').value = text;
      })
      .catch(error => {
        showToast('Error loading crontab: ' + error, 'crontabToast');
      });
    async function submitCrontabForm() {
      fetch('/crontab', {
        method: 'POST',
        body: document.getElementById('crontabEditor').value
      })
      .then(response => {
        if (!response.ok) {
          throw new Error('Failed to save crontab');
        }
      })
      .catch(error => {
        showToast('Error saving crontab: ' + error, 'crontabToast');
      });
    }
    function showToast(message, elementId) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = 'toast error';
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }
  </script>
</head>
<body>
  <div id="title">&nbsp;SPLIT FLAP&nbsp;</div>
  <div class="content-container">
    <div id="status-display">
      <div id="flap-container"></div>
      <div class="status-info">
        <span><span id="wifi-dot" class="status-dot off"></span> <span id="status-source">--</span></span>
        <span id="status-uptime">--</span>
        <span id="status-mem">--</span>
      </div>
    </div>
    <form id="form" method="post" action="/display">
      <div class="form-row">
          <input type="text" id="text_input" name="text" maxlength="100" placeholder="Enter up to 24 letters">
          <select id="order_input" name="order" required>
            <option value="start_in_sync">|&gt;</option>
            <option value="end_in_sync">&gt;|</option>
            <option value="sweep">&gt;&gt;</option>
            <option value="diagonal_sweep">&gt;v</option>
            <option value="random">##</option>
          </select>
          <select id="rpm_input" name="rpm" required>
            <option value="5">5 rpm</option>
            <option value="10" selected>10 rpm</option>
            <option value="15">15 rpm</option>
          </select>
      </div>
      <div class="form-row">
        <button type="button" onclick="submitGoForm()">Go</button>
        <button type="button" onclick="fillWithRandomWords()">I'm Feeling Lucky</button>
      </div>
      <div id="goToast" class="toast"></div>
    </form>
    <div id="preset-container">
      Clock
      <a href="#" onclick="preset({format:'CLOCK',text:'%H:%M  %d.%m%w  %tC',timezone:'Europe/Stockholm',lat:'59.33',lon:'18.07'}, 'start_in_sync')">STO</a>
      <a href="#" onclick="preset({format:'CLOCK',text:'ADL  %H:%M    %d.%m.%Y',timezone:'Australia/Adelaide'}, 'start_in_sync')">ADL</a>
      <a href="#" onclick="preset({format:'CLOCK',text:'NYC  %H:%M    %d.%m.%Y',timezone:'America/New_York'}, 'start_in_sync')">NYC</a><br/>
      Word Clock
      <a href="#" onclick="preset({format:'WORD_CLOCK',lang:'en',timezone:'Europe/Stockholm'}, 'end_in_sync')">STO English</a>
      <a href="#" onclick="preset({format:'WORD_CLOCK',lang:'sv',timezone:'Europe/Stockholm'}, 'end_in_sync')">STO Svenska</a><br/>
      <a href="#" onclick="preset({format:'NEW_YEAR',timezone:'Europe/Stockholm'}, 'start_in_sync')">NYE Countdown</a><br/>
      <a href="#" onclick="preset({format:'ART'}, 'end_in_sync')">Art</a><br/>
      <a href="#" onclick="preset({format:'MOTION'}, 'start_in_sync')">Motion</a><br/>
      <a href="#" onclick="preset({format:'DAD_JOKE',text:'Dad joke:'}, 'end_in_sync')">Dad Joke</a><br/>
      <a href="#" onclick="preset({text:'aaaaaaaaaaaaaaaaaaaaaaaa'}, 'end_in_sync')">As</a>
      <a href="#" onclick="preset({text:'zzzzzzzzzzzzzzzzzzzzzzzz'}, 'end_in_sync')">Zs</a>
      <a href="#" onclick="preset({format:'ALL_LETTERS'}, 'end_in_sync')">All</a>
    </div>
    <div class="crontab-section">
      <h2>Crontab</h2>
      <textarea id="crontabEditor" placeholder="Loading crontab..."></textarea>
      <br>
      <button type="button" onclick="submitCrontabForm()">Save</button>
      <div id="crontabToast" class="toast"></div>
    </div>
  </div>
</body>
</html>
